apiVersion: apps/v1
kind: Deployment
metadata:
  name: router
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: router
  template:
    metadata:
      labels:
        app: router
      annotations:
        prometheus.io/scrape: "{{ .Values.observability.prometheus.scrape }}"
        prometheus.io/path: "{{ .Values.observability.prometheus.path }}"
        prometheus.io/port: "{{ .Values.router.port }}"
    spec:
      containers:
      - name: router
        image: "{{ .Values.router.image }}"
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: {{ .Values.router.port }}
        env:
        - name: REDIS_URL
          value: "redis://my-redis-master:6379/0" # Points to the Bitnami Redis we just deployed
        - name: ROUTER_URL
          value: "http://router-service:3000"
        - name: LANGFUSE_HOST
          value: "{{ .Values.observability.langfuse.host }}"
        - name: LANGFUSE_PUBLIC_KEY
          value: "{{ .Values.observability.langfuse.publicKey }}"
        - name: LANGFUSE_SECRET_KEY
          value: "{{ .Values.observability.langfuse.secretKey }}"