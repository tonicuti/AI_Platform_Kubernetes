version: '3.8'

services:
  # ----------------------------------------
  # Backing Services
  # ----------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: llmdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d llmdb"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  # ----------------------------------------
  # FastAPI Services
  # ----------------------------------------
  api-gateway:
    build: 
      context: ./gateway
    container_name: api_gateway
    ports:
      - "3000:3000" # Map host port 3000 to container port 3000
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ROUTER_URL=http://router-service:3000
    depends_on:
      redis:
        condition: service_healthy

  router-service:
    build: 
      context: ./router
    container_name: router_service
    ports:
      - "3001:3000" # Map host port 3001 to container port 3000
    environment:
      - DATABASE_URL=postgresql://admin:password123@postgres:5432/llmdb
      - PROXY_URL=http://llm-proxy:3000
    depends_on:
      postgres:
        condition: service_healthy

  llm-proxy:
    build: 
      context: ./proxy
    container_name: llm_proxy
    ports:
      - "3002:3000" # Map host port 3002 to container port 3000
    environment:
      # Pass any external API keys here
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}

# ----------------------------------------
# Volumes (For Data Persistence)
# ----------------------------------------
volumes:
  postgres_data:
  redis_data: